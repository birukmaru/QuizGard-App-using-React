name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quiz-client/package-lock.json

      - name: Install dependencies
        working-directory: ./quiz-client
        run: npm install

      - name: Run tests
        working-directory: ./quiz-client
        run: npm test

      - name: Build project
        working-directory: ./quiz-client
        run: npm run build